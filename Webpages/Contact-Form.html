<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - Luxury Method</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <style>
        /* =========================================
       1. RESET & GLOBAL STYLES
       ========================================= */
        * {
            box-sizing: border-box;
            font-family: "Cormorant Garamond", serif;
            outline: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #ebe0d5;
            display: flex;
            flex-direction: column; /* Stack form and footer */
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scrollbar styling for Webkit */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        /* Wrapper to center form in available space */
        .page-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px 20px; /* Padding to ensure toggle isn't clipped */
            width: 100%;
        }

        /* =========================================
       2. FORM CONTAINER
       ========================================= */
        .form-container {
            width: 100%;
            max-width: 500px;
            background: transparent;
            padding: 10px;
            position: relative;
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            text-align: center;
            font-size: 3rem;
            font-weight: 400;
            margin: 0 0 30px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #000;
        }

        /* =========================================
       3. LANGUAGE TOGGLE
       ========================================= */
        .lang-toggle {
            position: absolute;
            top: -60px; /* Moved up slightly */
            right: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 80px;
            height: 36px;
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid #000;
            border-radius: 40px;
            cursor: pointer;
            padding: 3px;
            transition: transform 0.2s ease;
        }

        .lang-toggle:hover {
            transform: scale(1.05);
        }

        .toggle-slider {
            position: absolute;
            left: 3px;
            top: 3px;
            width: 36px;
            height: 28px;
            background-color: #000;
            border-radius: 30px;
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 1;
        }

        .lang-text {
            position: relative;
            z-index: 2;
            flex: 1;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 700;
            transition: color 0.4s ease;
            user-select: none;
            line-height: 1;
        }

        .lang-text.en { color: #fff; }
        .lang-text.it { color: #000; opacity: 0.6; }

        /* IT Mode State */
        .lang-toggle.it-mode .toggle-slider {
            transform: translateX(36px);
        }
        .lang-toggle.it-mode .lang-text.en { color: #000; opacity: 0.6; }
        .lang-toggle.it-mode .lang-text.it { color: #fff; opacity: 1; }

        /* =========================================
       4. INPUT FIELDS & ICONS
       ========================================= */
        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            width: 20px;
            height: 20px;
            color: #000;
            opacity: 0.4;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        input, select, textarea {
            width: 100%;
            padding: 15px 15px 15px 45px;
            font-size: 1.1rem;
            background-color: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(0, 0, 0, 0.2);
            border-radius: 5px;
            transition: all 0.3s ease;
            color: #000;
            font-weight: 500;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            padding-top: 15px;
        }
        
        .textarea-icon {
            top: 15px;
        }

        input:focus, select:focus, textarea:focus {
            background-color: rgba(255, 255, 255, 0.6);
            border-color: #000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        select:invalid { color: rgba(0, 0, 0, 0.5); }
        select option { color: #000; }

        input:focus + .input-icon,
        select:focus + .input-icon,
        textarea:focus + .input-icon {
            opacity: 1;
            transform: scale(1.1);
            color: #000;
        }

        .phone-group {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 10px;
        }
        
        .phone-group select {
            padding: 15px 5px 15px 10px;
            text-align: center;
            padding-left: 5px;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        /* =========================================
       5. CHECKBOX & BUTTON
       ========================================= */
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            font-size: 1.1rem;
        }

        .checkbox-group input {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            accent-color: #000;
            cursor: pointer;
            padding: 0;
        }

        .checkbox-group a {
            color: #000;
            text-decoration: underline;
            font-weight: 600;
        }

        button {
            width: 100%;
            padding: 16px;
            font-size: 1.2rem;
            background-color: #000;
            color: #fff;
            border: 1px solid #000;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            background-color: #fff;
            color: #000;
        }
        
        button svg {
            transition: transform 0.3s ease;
        }
        
        button:hover svg {
            transform: translateX(5px);
        }

        #responseMessage {
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 15px;
            min-height: 1.5em;
            font-weight: 600;
        }
        .success { color: #2d5a27; }
        .error { color: #8b0000; }

        /* =========================================
       6. FOOTER (Taken from Privacy Policy)
       ========================================= */
        .luxury-footer {
            background-image: url("https://luxury-method.vercel.app/Footer.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 100px 0;
            color: #e5d7b1;
            width: 100%;
            margin-top: auto;
        }

        .luxury-footer-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            max-width: 1200px;
            width: 90%;
            margin: auto;
        }

        .luxury-footer-contact small, 
        .luxury-footer-contact a {
            display: block;
            margin-bottom: 18px;
            font-size: 18px;
            letter-spacing: 0.5px;
            color: #e5d7b1;
            text-decoration: none;
        }

        .social-icons {
            display: flex;
            gap: 20px;
            justify-content: flex-end;
            align-items: center;
        }

        .social-link img {
            width: 40px;
            object-fit: contain;
        }

        /* =========================================
       7. MOBILE RESPONSIVENESS
       ========================================= */
        @media (max-width: 768px) {
            h2 { font-size: 2.2rem; }
            .lang-toggle { top: -45px; }
            
            .luxury-footer-content {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 30px;
            }
            
            .social-icons {
                justify-content: center;
            }
            
            .page-content {
                padding: 60px 20px;
            }
        }
    </style>
</head>

<body>

    <div class="page-content">
        <div class="form-container">
            <!-- Language Toggle -->
            <div class="lang-toggle" id="langToggle" onclick="toggleLanguage()">
                <div class="toggle-slider"></div>
                <span class="lang-text en">EN</span>
                <span class="lang-text it">IT</span>
            </div>
    
            <h2 id="form-title">Contact Us</h2>
            
            <form id="contactForm">
                <!-- Name -->
                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="text" id="name" name="name" placeholder="Enter your name" required>
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                </div>
    
                <!-- Email -->
                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                    </div>
                </div>
    
                <!-- Phone -->
                <div class="input-group phone-group">
                    <div class="input-wrapper">
                        <select id="countryCode" name="countryCode" required>
                            <option value="" disabled selected id="country-placeholder">Code</option>
                            <option value="+1">+1 (US)</option>
                            <option value="+44">+44 (UK)</option>
                            <option value="+39">+39 (IT)</option>
                            <option value="+33">+33 (FR)</option>
                            <option value="+49">+49 (DE)</option>
                            <option value="+91">+91 (IN)</option>
                            <option value="+971">+971 (UAE)</option>
                            <option value="+86">+86 (CN)</option>
                            <option value="+81">+81 (JP)</option>
                            <option value="+61">+61 (AU)</option>
                            <option value="+7">+7 (RU)</option>
                            <option value="+34">+34 (ES)</option>
                        </select>
                    </div>
                    <div class="input-wrapper">
                        <input type="tel" id="number" name="number" placeholder="Enter your number" required pattern="[0-9]+">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                        </svg>
                    </div>
                </div>
    
                <!-- Message -->
                <div class="input-group">
                    <div class="input-wrapper">
                        <textarea id="message" name="message" placeholder="Enter your message" rows="2" required></textarea>
                        <svg class="input-icon textarea-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                        </svg>
                    </div>
                </div>
    
                <!-- Terms -->
                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms" id="terms-label">I agree to the <a href="https://www.luxury-method.com/privacy-policy" target="_blank">Privacy Policy</a></label>
                </div>
    
                <!-- Status Message -->
                <p id="responseMessage"></p>
    
                <!-- Submit Button -->
                <button type="submit" id="submitBtn">
                    <span id="btn-text">Submit</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="luxury-footer">
        <div class="luxury-footer-content">
            <div class="luxury-footer-contact">
                <small>
                    <a target="_blank" style="font-weight: bold; text-decoration: none"
                        href="mailto:giacomo@luxury-method.com">giacomo@luxury-method.com</a>
                </small>
                <a href="tel:+393920034695"><small>(+39) 3920034695</small></a>
                <small>P.IVA: 17906211002</small>
            </div>

            <div class="social-icons">
                <div class="social-link">
                    <a href="https://www.instagram.com/luxurymethod_agency/" target="_blank">
                        <img src="https://i.postimg.cc/XJSn0GKM/image-976.png" alt="Instagram" />
                    </a>
                </div>
                <div class="social-link">
                    <a href="https://x.com/luxury_method" target="_blank">
                        <img src="https://luxury-method.vercel.app/twitter-logo.png" alt="X" />
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // ============================
        // 1. LANGUAGE LOGIC
        // ============================
        let currentLang = 'en';

        const translations = {
            en: {
                title: "Contact Us",
                name: "Enter your name",
                email: "Enter your email",
                phone: "Enter your number",
                message: "Enter your message",
                terms: "I agree to the <a href='https://www.luxury-method.com/privacy-policy' target='_blank'>Privacy Policy</a>",
                submit: "Submit",
                success: "Thank you for your message!",
                error: "Error, please try again!",
                alert: "You must agree to the Privacy Policy.",
                codeAlert: "Please select your country code.",
                codePlaceholder: "Code"
            },
            it: {
                title: "Contattaci",
                name: "Inserisci il tuo nome",
                email: "Inserisci la tua email",
                phone: "Inserisci il tuo numero",
                message: "Scrivi il tuo messaggio",
                terms: "Accetto la <a href='https://www.luxury-method.com/privacy-policy' target='_blank'>Privacy Policy</a>",
                submit: "Invia",
                success: "Grazie per il tuo messaggio!",
                error: "Errore, riprova!",
                alert: "Devi accettare la Privacy Policy.",
                codeAlert: "Seleziona il prefisso del tuo paese.",
                codePlaceholder: "Prefisso"
            }
        };

        function toggleLanguage() {
            const toggleContainer = document.getElementById('langToggle');
            const formContainer = document.querySelector('.form-container');

            // Toggle State
            currentLang = currentLang === 'en' ? 'it' : 'en';
            
            // Animate Switch
            if (currentLang === 'it') {
                toggleContainer.classList.add('it-mode');
            } else {
                toggleContainer.classList.remove('it-mode');
            }

            // Update Content with Fade effect
            formContainer.style.opacity = '0.5';
            setTimeout(() => {
                const t = translations[currentLang];
                
                document.getElementById('form-title').innerText = t.title;
                document.getElementById('name').placeholder = t.name;
                document.getElementById('email').placeholder = t.email;
                document.getElementById('number').placeholder = t.phone;
                document.getElementById('message').placeholder = t.message;
                document.getElementById('terms-label').innerHTML = t.terms;
                document.getElementById('btn-text').innerText = t.submit;
                document.getElementById('country-placeholder').innerText = t.codePlaceholder;
                
                // Clear any previous messages when switching lang
                document.getElementById('responseMessage').innerText = '';
                
                formContainer.style.opacity = '1';
            }, 200);
        }


        // ============================
        // 2. FORM SUBMISSION LOGIC
        // ============================
        document.getElementById('contactForm').addEventListener('submit', function (event) {
            event.preventDefault(); 
            const t = translations[currentLang];
            const responseMsg = document.getElementById('responseMessage');
            const submitBtn = document.getElementById('submitBtn');

            // Gather Data
            var name = document.getElementById('name').value;
            var email = document.getElementById('email').value;
            var countryCode = document.getElementById('countryCode').value;
            var number = document.getElementById('number').value;
            var message = document.getElementById('message').value;
            var terms = document.getElementById('terms').checked;

            // Custom Validations
            if (countryCode === "") {
                alert(t.codeAlert);
                return;
            }

            if (!terms) {
                alert(t.alert);
                return;
            }

            // UX: Loading State
            submitBtn.disabled = true;
            submitBtn.style.opacity = "0.7";
            submitBtn.querySelector('span').innerText = "...";
            responseMsg.innerText = "";
            responseMsg.className = "";

            var fullNumber = countryCode + number; 

            var formData = new FormData();
            formData.append('name', name);
            formData.append('email', email);
            formData.append('number', fullNumber);
            formData.append('message', message);

            var scriptUrl = 'https://script.google.com/macros/s/AKfycby1ocIIH2izmOsB31lOnTKcBdDckGxk5UxpwZRANiPmXxHes-busJmj7wQuGYXF3O3w/exec';

            fetch(scriptUrl, {
                method: 'POST',
                body: formData
            })
            .then(response => response.text())
            .then(responseText => {
                responseMsg.textContent = t.success;
                responseMsg.className = "success";
                document.getElementById('contactForm').reset();
            })
            .catch(error => {
                responseMsg.textContent = t.error;
                responseMsg.className = "error";
                console.error('Error:', error);
            })
            .finally(() => {
                // Reset Button
                submitBtn.disabled = false;
                submitBtn.style.opacity = "1";
                submitBtn.querySelector('span').innerText = t.submit;
            });
        });
    </script>
</body>
</html>
